<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; color: #1a1a1a; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; border-top: 1px solid #ddd8d0; border-bottom: 1px solid #ddd8d0; padding: 1.6rem 0; margin-bottom: 1.6rem; }
  .stat { text-align: center; }
  .stat-val { display: block; font-family: 'Playfair Display', Georgia, serif; font-size: 1.6rem; font-weight: 700; color: #b85c2a; line-height: 1.1; margin-bottom: 0.3rem; }
  .stat-lbl { display: block; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #777; }
  #map { width: 100%; height: 420px; border-radius: 10px; border: 0.5px solid #e0e0e0; }
  .section-label { font-size: 11px; color: #999; margin: 10px 0 6px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
  .steps-list { max-height: 240px; overflow-y: auto; border: 0.5px solid #e0e0e0; border-radius: 8px; }
  .step-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 0.5px solid #f0f0f0; cursor: pointer; transition: background 0.12s; }
  .step-row:last-child { border-bottom: none; }
  .step-row:hover { background: #f8f8f6; }
  .step-row.active { background: #e8f4ee; }
  .step-img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: #f0f0f0; }
  .step-ph { width: 36px; height: 36px; border-radius: 6px; background: #f0f0f0; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .step-name { font-size: 13px; font-weight: 500; }
  .step-detail { font-size: 11px; color: #888; margin-top: 1px; }
  .step-num { font-size: 11px; color: #bbb; min-width: 22px; text-align: right; }
  .tt-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #fff; background: #000; border-radius: 4px; padding: 3px 7px; text-decoration: none; flex-shrink: 0; white-space: nowrap; }
  .tt-btn:hover { background: #333; }
  .ig-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #fff; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border-radius: 4px; padding: 3px 7px; text-decoration: none; flex-shrink: 0; white-space: nowrap; }
  .ig-btn:hover { opacity: 0.88; }
  .loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
  .error { text-align: center; padding: 1rem; color: #c0392b; font-size: 13px; background: #fdf0f0; border-radius: 8px; margin-bottom: 10px; }
  @media (max-width: 480px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    #map { height: 280px; }
  }
</style>
</head>

  'Ometepe':                        'https://www.instagram.com/p/DZVZ-lhK1HJ/',
  'Ometepe Island':                 'https://www.instagram.com/p/DZVZ-lhK1HJ/',
  'San Juan del Sur':               'https://www.instagram.com/p/DZa0eQdKpn0/',
  'Rincón de la Vieja':             'https://www.instagram.com/p/DZlCUMBq-tO/',
  'Rincon de la Vieja':             'https://www.instagram.com/p/DZlCUMBq-tO/',
  'Rincón de la Vieja Volcano National Park': 'https://www.instagram.com/p/DZlCUMBq-tO/',
  'Monteverde':                     'https://www.instagram.com/p/DZvhhAMS8SW/',
  'Monteverde Cloud Forest Reserve':'https://www.instagram.com/p/DZvhhAMS8SW/',
  'Manuel Antonio':                 'https://www.instagram.com/p/DZ2_CgfyNpf/',
  'Manuel Antonio National Park':   'https://www.instagram.com/p/DZ2_CgfyNpf/',
  'Corcovado':                      'https://www.instagram.com/p/DZ8D4gEKBoO/',
  'Corcovado National Park':        'https://www.instagram.com/p/DZ8D4gEKBoO/',
  'Biolley':                        'https://www.instagram.com/p/DaBrwE2qUny/',
};

let map, markers = [], polyline, activeRow = null;

function initMap() {
  map = L.map('map', { scrollWheelZoom: false, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    maxZoom: 18
  }).addTo(map);
}

function makeIcon(color, size) {
  return L.divIcon({
    html: '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';border:2.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.25)"></div>',
    iconSize: [size, size], iconAnchor: [size/2, size/2], className: ''
  });
}

function renderTrip(data) {
  const trip = data.trips && data.trips[0];
  if (!trip) { showError(STRINGS.noTrip); return; }

  const steps = (trip.steps || []).filter(function(s) { return s.location && s.location.lat && s.location.lon; });
  if (!steps.length) { showError(STRINGS.noSteps); return; }

  document.getElementById('stat-km').textContent = Math.round(trip.total_km || 0).toLocaleString() + '+';
  document.getElementById('stat-countries').textContent = data.stats ? data.stats.country_count : '—';
  document.getElementById('stat-steps').textContent = steps.length;
  document.getElementById('stat-days').textContent = Math.round((new Date() - DEPARTURE) / (1000*60*60*24));

  const latLngs = steps.map(function(s) { return [s.location.lat, s.location.lon]; });
  if (polyline) map.removeLayer(polyline);
  polyline = L.polyline(latLngs, { color: '#1D9E75', weight: 2.5, opacity: 0.75 }).addTo(map);
  map.fitBounds(polyline.getBounds().pad(0.08));

  markers.forEach(function(m) { map.removeLayer(m); });
  markers = [];

  steps.forEach(function(s, i) {
    var isFirst = i === 0;
    var isLast = i === steps.length - 1;
    var color = isLast ? '#D85A30' : isFirst ? '#7F77DD' : '#1D9E75';
    var size = (isFirst || isLast) ? 16 : 9;
    var m = L.marker([s.location.lat, s.location.lon], { icon: makeIcon(color, size) }).addTo(map);
    var flag = FLAGS[s.location.country_code] || '';
    var name = s.name || s.location.locality || s.location.country;
    var date = s.start_time ? s.start_time.slice(0,10) : '';
    var socialUrl = PLATFORM === 'instagram' ? INSTAGRAMS[name] : TIKTOKS[name];
    var watchLabel = PLATFORM === 'instagram' ? STRINGS.watchInstagram : STRINGS.watchTikTok;
    var popBtnStyle = PLATFORM === 'instagram'
      ? 'display:inline-block;margin-top:6px;font-size:11px;color:#fff;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-radius:4px;padding:3px 8px;text-decoration:none'
      : 'display:inline-block;margin-top:6px;font-size:11px;color:#fff;background:#000;border-radius:4px;padding:3px 8px;text-decoration:none';
    var popHtml = '<div style="font-size:13px;min-width:140px"><strong>' + name + '</strong><br>'
      + '<span style="color:#888">' + flag + ' ' + (s.location.full_detail || '') + '</span><br>'
      + '<span style="color:#aaa;font-size:11px">' + date + '</span>'
      + (socialUrl ? '<br><a href="' + socialUrl + '" target="_blank" style="' + popBtnStyle + '">' + watchLabel + '</a>' : '')
      + '</div>';
    m.bindPopup(popHtml, { maxWidth: 240 });
    markers.push(m);
  });

  var list = document.getElementById('steps-list');
  list.innerHTML = '';

  steps.forEach(function(s, i) {
    var name = s.name || s.location.locality || s.location.country;
    var flag = FLAGS[s.location.country_code] || '';
    var date = s.start_time ? s.start_time.slice(0,10) : '';
    var imgUrl = s.first_media_item && s.first_media_item.large_thumbnail_path;
    var socialUrl = PLATFORM === 'instagram' ? INSTAGRAMS[name] : TIKTOKS[name];
    var listBtnClass = PLATFORM === 'instagram' ? 'ig-btn' : 'tt-btn';
    var listBtnLabel = PLATFORM === 'instagram' ? STRINGS.igBtn : STRINGS.tiktokBtn;

    var row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = (imgUrl
        ? '<img class="step-img" src="' + imgUrl + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<div class="step-ph">' + flag + '</div>')
      + '<div style="flex:1;min-width:0;overflow:hidden">'
      + '<div class="step-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + name + '</div>'
      + '<div class="step-detail">' + flag + ' ' + (s.location.full_detail || '') + ' · ' + date + '</div>'
      + '</div>'
      + (socialUrl ? '<a class="' + listBtnClass + '" href="' + socialUrl + '" target="_blank" onclick="event.stopPropagation()">' + listBtnLabel + '</a>' : '')
      + '<div class="step-num">#' + (i+1) + '</div>';

    row.addEventListener('click', function() {
      if (activeRow) activeRow.classList.remove('active');
      row.classList.add('active');
      activeRow = row;
      map.setView([s.location.lat, s.location.lon], 9, { animate: true });
      markers[i].openPopup();
    });
    list.appendChild(row);
  });
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function loadTrip() {
  try {
    var res = await fetch(PROXY + '/users/byusername/' + USERNAME);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    if (data.error) throw new Error(data.message || data.error);
    renderTrip(data);
  } catch (e) {
    showError(STRINGS.couldNotLoad + e.message);
    document.getElementById('steps-list').innerHTML = '';
  }
}

window.onload = function() {
  initMap();
  loadTrip();
};
</script>
</body>
